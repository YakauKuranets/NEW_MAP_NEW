version: "3.9"

services:
  web:
    build: .
    container_name: mapv12_web_dev
    command: ["gunicorn", "-c", "deploy/gunicorn.conf.py", "wsgi:app"]
    env_file:
      - .env.dev
    volumes:
      # Монтируем код для быстрой разработки
      - .:/app
      # Отдельно монтируем базу и uploads, чтобы данные не терялись
      - ./app.db:/app/app.db
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  bot:
    build: .
    container_name: mapv12_bot_dev
    command: ["python", "bot.py"]
    env_file:
      - .env.dev
    environment:
      # Внутри docker-сети сервис web доступен по имени "web"
      MAP_API_URL: "http://web:8000"
    volumes:
      - .:/app
      - ./app.db:/app/app.db
    depends_on:
      - web
    restart: unless-stopped
